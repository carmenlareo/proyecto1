<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Google Pixel Buds Pro</title>
  <link rel="stylesheet" href="../style-watches.css" />
</head>

<body>
  <header class="header">
    <nav class="nav">
      <img src="../images/google-logo.png" alt="Google Store Logo" />
      <a href="#">Phones</a>
      <a href="../index.html">Earbuds</a>
      <a href="pages/watch.html">Watches</a>
      <a href="#">Smart Home</a>
      <a href="#">Accesories</a>
      <a href="#">Subscriptions</a>
    </nav>
    <div class="header-icons">
      <img src="../images/icons/Search.svg" alt="Search Icon" />
      <img src="../images/icons/Help.svg" alt="Help Icon" />
      <img src="../images/icons/Cart.svg" alt="Cart Icon" />
      <img src="../images/icons/Avatar.svg" alt="Avatar Icon" />
    </div>
    <div class="menu-btn" id="menuBtn">
      <span></span>
      <span></span>
      <span></span>
    </div>
  </header>
  <main class="product-container">

     <section class="watch-gallery">
      <div class="watch-big">
        <img src="../images/smartwatch/smartwatch_black.png" alt="Fitbit Inspire 3" />
      </div>
    </section> 


    <aside class="product-info">
      <h1>Fitbit Inspire 3</h1>
      <p class="category">Health & Fitness Tracker</p>
      <p class="price">99,95€</p>
      <hr />
      <p>Choose a color</p>
      <div class="square-watch">
        <div class="watch-selector">
          <img src="../images/smartwatch/smartwatch_black.png" alt="Watch black" />
          <p>Midnight Zen</p>
        </div>
        <div class="watch-selector">
          <img src="../images/smartwatch/smartwatch_pink.png" alt="Watch pink" />
          <p>Lilac Bliss</p>
        </div>
        <div class="watch-selector">
          <img src="../images/smartwatch/smartwatch_yellow.png" alt="Watch yellow" />
          <p>Morning Glow</p>
        </div>
      </div>
      <div class="buy-box">
        <p class="buy-price">99,95€</p>
        <div class="buy-action">
          <select>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
          </select>
          <button class="add-cart">Add to Cart</button>
        </div>
        <p class="delivery">
          <span class="truck-icon"><img src="../images/icons/Delivery.svg" alt="Truck Icon" /></span>
          Delivers 29 Apr to <b class="text-blue">08023</b>
        </p>
      </div>
    </aside>
  </main>
  <footer class="footer">
    <div class="footer-content">
      <div class="footer-social">
        <img src="../images/icons/SM-x.svg" alt="SM-x Icon" />
        <img src="../images/icons/SM-instagram.svg" alt="SM-instagram Icon" />
        <img src="../images/icons/SM-facebook.svg" alt="sm-facebook Icon" />
        <img src="../images/icons/SM-youtube.svg" alt="sm-youtube Icon" />
        <img src="../images/icons/SM-tiktok.svg" alt="sm-tiktok Icon" />
      </div>
      <div class="footer-links">
        <div class="footer-country">
          <img src="../images/icons/Spain.svg" alt="Spain Icon" />
          <span>Spain</span>
        </div>
        <a href="#">Privacy</a>
        <a href="#">Google Nest Commitment to Privacy</a>
        <a href="#">Sales Terms</a>
        <a href="#">Terms of Service</a>
      </div>
    </div>
  </footer>
  
  <script src="../script/script-earbuds.js"></script>
  <script src="../script/script-watches.js"></script>
  <script src="../script/script-hamburguesa.js"></script>
</body>

</html>
